# ──────────────────────────────────────────────
#  MedCloud — Docker Compose
# ──────────────────────────────────────────────
services:

  # ── Django ASGI App (Daphne) ────────────────
  web:
    build: .
    env_file: .env
    environment:
      - DATABASE_URL=postgres://medCloud:${POSTGRES_PASSWORD}@postgres:5432/medCloud
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - static_files:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ── Nginx Reverse Proxy ─────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
    depends_on:
      - web
    restart: unless-stopped

  # ── PostgreSQL Database ─────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medCloud
      POSTGRES_USER: medCloud
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medCloud"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis (Channel Layer) ───────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  # ── PACS Image Sync (Background Worker) ─────
  sync_pacs:
    build: .
    env_file: .env
    environment:
      - DATABASE_URL=postgres://medCloud:${POSTGRES_PASSWORD}@postgres:5432/medCloud
      - REDIS_URL=redis://redis:6379/0
    entrypoint: >
      bash -c "
        echo '⏳ Waiting for web to be ready...' &&
        sleep 10 &&
        echo '🔄 Starting PACS sync loop...' &&
        python manage.py sync_pacs_images
      "
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  static_files:

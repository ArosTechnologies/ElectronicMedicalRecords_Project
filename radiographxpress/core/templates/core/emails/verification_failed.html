{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación fallida - Radiograph Xpress</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/css/design-system.css' %}">
    <link rel="stylesheet" href="{% static 'patientsDashboard/login.css' %}">
</head>

<body class="login-body">
    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-header">
                <img src="{% static 'core/assets/img/logos/radiographxpress_logo.png' %}" class="login-logo-img"
                    alt="Radiograph Xpress">
                <div class="info-icon">⚠️</div>
                <h2>Enlace de verificación inválido</h2>
            </div>
            <p class="info-text">
                El enlace de verificación ha expirado o no es válido.
                Por favor, intenta registrarte de nuevo o contacta al laboratorio para asistencia.
            </p>
            <a href="{% url 'login' %}" class="back-link">← Volver al inicio de sesión</a>
        </div>
    </div>
</body>

</html>
